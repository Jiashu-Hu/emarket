spring:
  datasource:
    url: jdbc:h2:mem:account-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

emarket:
  jwt:
    issuer: http://account-service:8081
    audience: emarket
    key-id: emarket-dev-1
    private-key-path: classpath:dev-keys/private_key.pem
    public-key-path: classpath:dev-keys/public_key.pem
    ttl: PT1H
