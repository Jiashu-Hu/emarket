server:
  port: 8081

spring:
  application:
    name: account-service

management:
  endpoints:
    web:
      exposure:
        include: health

emarket:
  jwt:
    issuer: http://account-service:8081
    audience: emarket
    key-id: emarket-dev-1
    private-key-path: classpath:dev-keys/private_key.pem
    public-key-path: classpath:dev-keys/public_key.pem
    ttl: PT1H
